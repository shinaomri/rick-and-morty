
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: timshina/rick-and-morty:latest

    - name: Start minikube
      uses: medyagh/setup-minikube@latest

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy with Helm
      run: |
        helm install rick-and-morty helm/rick-and-morty || helm upgrade rick-and-morty helm/rick-and-morty

    - name: Wait for pods to be ready
      run: |
        kubectl wait --for=condition=ready pod -l app=rick-and-morty --timeout=120s

    - name: Test endpoints
      run: |
        kubectl port-forward service/rick-and-morty 5000:80 &
        sleep 5
        curl http://localhost:5000/healthcheck
        curl http://localhost:5000/characters